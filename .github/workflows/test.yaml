name : TEST RUN

on:
  push:
      branches:
              - main
              - develop
              - feature/*
  pull_request:
      branches:
              - main
              - develop
jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install Dependencies
              run: npm install
              
            - name: Run Lint
              run: npm run lint

            - name: Run Jest Tests
              run: npm test
            - name: Code Coverage
              run: npm run test:coverage

  